name: Bump Version

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest

    # Skip if the last commit was a version bump (prevent infinite loop)
    if: "!startsWith(github.event.head_commit.message, 'chore: bump version to')"

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine bump type
        id: bump-type
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "type=${{ inputs.bump }}" >> "$GITHUB_OUTPUT"
          else
            echo "type=patch" >> "$GITHUB_OUTPUT"
          fi

      - name: Read current version
        id: current
        run: |
          version=$(jq -r '.version' .claude-plugin/plugin.json)
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Compute next version
        id: next
        run: |
          IFS='.' read -r major minor patch <<< "${{ steps.current.outputs.version }}"
          case "${{ steps.bump-type.outputs.type }}" in
            major) major=$((major + 1)); minor=0; patch=0 ;;
            minor) minor=$((minor + 1)); patch=0 ;;
            patch) patch=$((patch + 1)) ;;
          esac
          echo "version=${major}.${minor}.${patch}" >> "$GITHUB_OUTPUT"

      - name: Update plugin.json
        run: |
          jq --arg v "${{ steps.next.outputs.version }}" \
            '.version = $v' .claude-plugin/plugin.json > tmp.json \
            && mv tmp.json .claude-plugin/plugin.json

      - name: Update marketplace.json
        run: |
          jq --arg v "${{ steps.next.outputs.version }}" \
            '.plugins[0].version = $v' .claude-plugin/marketplace.json > tmp.json \
            && mv tmp.json .claude-plugin/marketplace.json

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .claude-plugin/plugin.json .claude-plugin/marketplace.json
          git commit -m "chore: bump version to ${{ steps.next.outputs.version }}"
          git tag "v${{ steps.next.outputs.version }}"
          git push origin main --tags
